<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="InternLink is an internship tracking system that helps students manage applications, tasks, attendance, logbooks, and internship progress efficiently.">
    <meta name="keywords" content="Internship Tracker, Internship Management, Student Dashboard, Internship Applications">
    <meta name="author" content="Asma Aina Juraime">
    <title>InternLink | Internship Tracker Management System</title>
    <!--Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Bootstrap Icon CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--Google Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!--Custom CSS-->
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="container" id="auth-container">
        <!--LOGIN FORM-->
        <div class="form-box login">
            <form id="login-form" novalidate>
                <h1>Login</h1>

                <div class="alert alert-danger py-2" id="login-error" style="display:none;"></div>

                <div class='input-box'>
                    <input type="text" id="login-username" placeholder="studentintern123" required autocomplete="username">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="login-password" placeholder="123456" required autocomplete="current-password">
                    <i class="bi bi-lock-fill"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>or login with</p>
                <div class="social-icons">
                    <a href="#" class="google"><i class="bi bi-google"></i></a>
                    <a href="#" class="faceboock"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="github"><i class="bi bi-github"></i></a>
                    <a href="#" class="linkedin"><i class="bi bi-linkedin"></i></a>
                </div>
            </form>
        </div>

        <!--REGISTER BOX-->
        <div class="form-box register">
            <form id="register-form" novalidate>
                <h1>Registration</h1>

                <div class="alert alert-success py-2" id="register-success" style="display:none;">Registration successful! You can now login.</div>
                <div class="alert alert-danger py-2" id="register-error" style="display:none;"></div>

                <div class='input-box'>
                    <input type="text" id="reg-username" placeholder="Username" required>
                    <i class='bi bi-person-fill'></i>
                </div>
                <div class='input-box'>
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <i class='bi bi-envelope-fill'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <i class='bi bi-lock-fill'></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <p>or register with</p>
                <div class="social-icons">
                    <a href="#" class="google"><i class="bi bi-google"></i></a>
                    <a href="#" class="faceboock"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="github"><i class="bi bi-github"></i></a>
                    <a href="#" class="linkedin"><i class="bi bi-linkedin"></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <img src="img/logo.png" alt="LOGO" onerror="this.style.display='none'">
                <br>
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <img src="img/logo.png" alt="LOGO" onerror="this.style.display='none'">
                <br>
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <!--Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
